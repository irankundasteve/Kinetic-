name: Render Video

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main ] # Or your primary branch

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use a more recent node versions for better performance
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Use ci for more reliable builds

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build App
        run: npm run build

      - name: Start Dev Server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000

      - name: Run Rendering Script
        run: npx tsx scripts/render.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortal-clash-video
          path: immortal_clash.mp4
